# Grafana + Parquet PoC for Zecca
#
# Grafana has no built-in Parquet datasource. This PoC adds the (unsigned) DuckDB
# datasource plugin, which queries the project's hive-partitioned parquet files
# directly with DuckDB's read_parquet(), and renders them with Grafana's native
# candlestick panel.
#
# Usage:
#   1) python ../grafana/seed_sample_data.py   (generates ./data sample parquet)
#   2) docker compose up
#   3) open http://localhost:3000  (admin / admin) -> dashboard "Zecca — Candlestick PoC"
#
# Notes:
#   - The plugin needs glibc, so we use the -ubuntu image (NOT the default Alpine).
#   - The plugin is unsigned, so it is explicitly allowlisted below.
#   - GF_INSTALL_PLUGINS downloads the release zip at first start (needs internet).

services:
  grafana:
    image: grafana/grafana:11.6.0-ubuntu
    container_name: zecca-grafana-poc
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: motherduck-duckdb-datasource
      GF_INSTALL_PLUGINS: "https://github.com/motherduckdb/grafana-duckdb-datasource/releases/download/v0.4.3/motherduck-duckdb-datasource-0.4.3.zip;motherduck-duckdb-datasource"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      # Sample parquet generated by seed_sample_data.py. Swap for ../dataplatform
      # (read-only) to point the same dashboard at real pipeline output.
      - ./data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
